<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lizi Q | Professional Animation Lab</title>
    <style>
        :root { --bg: #080808; --accent: #00f2ff; --glass: rgba(255,255,255,0.03); }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* 導航列 */
        nav { background: rgba(10,10,10,0.95); border-bottom: 1px solid #222; padding: 10px 20px; position: fixed; width: 100%; top: 0; z-index: 1000; display: flex; align-items: center; justify-content: space-between; backdrop-filter: blur(10px); }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo-area img { height: 40px; border-radius: 5px; }
        .menu { display: flex; gap: 15px; margin-right: 40px; }
        .menu-btn { background: none; border: none; color: #888; cursor: pointer; font-size: 0.9rem; letter-spacing: 2px; transition: 0.3s; padding: 5px 10px; }
        .menu-btn:hover, .menu-btn.active { color: var(--accent); text-shadow: 0 0 10px var(--accent); }

        /* 首頁 Banner */
        .header-banner { width: 100%; height: 300px; margin-top: 60px; background: url('header.png') center/cover no-repeat; display: flex; align-items: center; justify-content: center; position: relative; }
        .header-banner::after { content: ''; position: absolute; bottom: 0; width: 100%; height: 100px; background: linear-gradient(transparent, var(--bg)); }

        /* 內容區塊 */
        .content-section { display: none; padding: 40px 5%; animation: fadeIn 0.6s ease; }
        .content-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 30px; margin-top: 30px; }
        .card { background: var(--glass); border: 1px solid #1a1a1a; border-radius: 15px; overflow: hidden; transition: 0.4s; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .media-container { width: 100%; aspect-ratio: 16/9; background: #000; }
        .media-container video, .media-container img { width: 100%; height: 100%; object-fit: cover; }
        .card-info { padding: 15px; text-align: center; font-size: 0.8rem; color: #666; letter-spacing: 1px; }

        /* YouTube 特殊區塊 */
        .yt-area { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .yt-box { background: #111; padding: 20px; border-radius: 10px; border-left: 4px solid #ff0000; text-decoration: none; color: white; }
    </style>
</head>
<body>
    <nav>
        <div class="logo-area">
            <img src="LiziQ Logo.jpg" alt="Logo">
            <span style="letter-spacing: 3px; font-weight: 200;">Lizi Q LAB</span>
        </div>
        <div class="menu">
            <button class="menu-btn active" onclick="showPage('home')">首頁</button>
            <button class="menu-btn" onclick="showPage('laoli')">老李</button>
            <button class="menu-btn" onclick="showPage('xiaoli')">小李</button>
            <button class="menu-btn" onclick="showPage('xiaoli_kitchen')">小荔</button>
            <button class="menu-btn" onclick="showPage('pili')">小霹靂</button>
            <button class="menu-btn" onclick="showPage('mowei')">魔尾</button>
            <button class="menu-btn" onclick="showPage('vlab')">V_lab</button>
        </div>
    </nav>

    <div class="header-banner"></div>
    <section id="home" class="content-section active">
        <h2 style="text-align:center; letter-spacing:10px;">WELCOME TO Lizi Q LAB</h2>
        <div class="yt-area">
            <a href="http://www.youtube.com/@LiziQ3308" target="_blank" class="yt-box"><h3>Lizi Q Main</h3><p>高品質短片創作頻道</p></a>
            <a href="http://www.youtube.com/@LiziQanimals" target="_blank" class="yt-box"><h3>Lizi Q Animals</h3><p>AI 奇幻動物實驗室</p></a>
        </div>
    </section>

    <section id="laoli" class="content-section">
        <div class="grid">
            <div class="card"><div class="media-container"><img src="Lizi Q_0_0.gif"></div><div class="card-info">老李 - 動態測試</div></div>
            <div class="card"><div class="media-container"><video autoplay loop muted playsinline><source src="Lizi Q_0_1.mp4" type="video/mp4"></video></div><div class="card-info">老李 - AI 生成展示</div></div>
        </div>
    </section>

    <section id="xiaoli" class="content-section">
        <div class="grid">
            <div class="card"><div class="media-container"><video autoplay loop muted playsinline><source src="Lizi Q_1_1.mp4" type="video/mp4"></video></div></div>
            <div class="card"><div class="media-container"><video autoplay loop muted playsinline><source src="Lizi Q_1_2.mp4" type="video/mp4"></video></div></div>
            <div class="card"><div class="media-container"><video autoplay loop muted playsinline><source src="Lizi Q_1_3.mp4" type="video/mp4"></video></div></div>
        </div>
    </section>

    <section id="xiaoli_kitchen" class="content-section">
        <div class="grid">
            <div class="card"><div class="media-container"><video autoplay loop muted playsinline><source src="Lizi Q_2_1.mp4" type="video/mp4"></video></div></div>
            <div class="card"><div class="media-container"><video autoplay loop muted playsinline><source src="Lizi Q_2_2.mp4" type="video/mp4"></video></div></div>
        </div>
    </section>

    <section id="pili" class="content-section">
        <div class="grid">
            <div class="card"><div class="media-container"><video autoplay loop muted playsinline><source src="Lizi Q_3_1.mp4" type="video/mp4"></video></div></div>
            <div class="card"><div class="media-container"><video autoplay loop muted playsinline><source src="Lizi Q_3_2.mp4" type="video/mp4"></video></div></div>
            <div class="card"><div class="media-container"><video autoplay loop muted playsinline><source src="Lizi Q_3_3.mp4" type="video/mp4"></video></div></div>
        </div>
    </section>

    <section id="mowei" class="content-section">
        <div class="grid">
            <div class="card"><div class="media-container"><video autoplay loop muted playsinline><source src="Lizi Q_4_1.mp4" type="video/mp4"></video></div></div>
            <div class="card"><div class="media-container"><video autoplay loop muted playsinline><source src="Lizi Q_4_2.mp4" type="video/mp4"></video></div></div>
        </div>
    </section>

    <section id="vlab" class="content-section">
        <div class="grid">
            <div class="card"><div class="media-container"><video autoplay loop muted playsinline><source src="Lizi Q_5_1.mp4" type="video/mp4"></video></div></div>
            <div class="card"><div class="media-container"><video autoplay loop muted playsinline><source src="Lizi Q_5_2.mp4" type="video/mp4"></video></div></div>
        </div>
    </section>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            event.target.classList.add('active');
            window.scrollTo(0, 300); // 點擊後自動滾動到內容區
        }
    </script>
</body>
</html>
