<!DOCTYPE html>
<html>
<head>
 <meta charset="UTF-8">
 <title>Mowei 3D Online</title>
 <style>
 body { background: #121212; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #00f2ff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
 .card { text-align: center; background: #1e1e1e; padding: 40px; border-radius: 20px; box-shadow: 0 0 30px rgba(0,242,255,0.2); border: 1px solid #333; }
 img { 
 width: 280px; 
 animation: float 4s ease-in-out infinite; 
 filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
 }
 @keyframes float {
 0%, 100% { transform: translateY(0) rotate(0deg); }
 50% { transform: translateY(-20px) rotate(2deg); }
 }
 h1 { letter-spacing: 5px; text-transform: uppercase; font-size: 1.5rem; margin-top: 20px; }
 </style>
</head>
<body>
 <div class="card">
 <img src="mowei.png" alt="Mowei 3D">
 <h1>Mowei 3D Online</h1>
 <p>✅ 系統修復完成 | 自動化部署已啟動</p>
 </div>
</body>
</html>
