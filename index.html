<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lizi Q | 精確校準版</title>
    <style>
        :root { --bg: #030303; --accent: #00f2ff; --card-bg: #111; }
        body { background: var(--bg); color: #fff; font-family: 'PingFang TC', sans-serif; margin: 0; overflow-x: hidden; }
        
        nav { 
            background: rgba(10,10,10,0.95); border-bottom: 1px solid #222; padding: 12px 5%; 
            position: fixed; width: 100%; top: 0; z-index: 1000; 
            display: flex; flex-direction: column; align-items: center; backdrop-filter: blur(10px); box-sizing: border-box;
        }

        .logo-area img { height: 70px; border-radius: 10px; box-shadow: 0 0 20px rgba(0,242,255,0.2); }
        
        .menu { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 100%; margin-top: 10px; }
        .menu-btn { 
            background: none; border: 1px solid #333; color: #aaa; cursor: pointer; 
            font-size: clamp(0.75rem, 2vw, 0.85rem); padding: 6px 14px; border-radius: 20px; transition: 0.3s;
        }
        .menu-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(0,242,255,0.1); }

        .header-banner { 
            width: 100%; margin-top: 180px; background: var(--bg) url('header.png') top center / contain no-repeat; 
            aspect-ratio: 2 / 1; position: relative; 
        }
        @media (min-width: 768px) {
            nav { flex-direction: row; justify-content: space-between; }
            .menu { width: auto; margin-top: 0; }
            .header-banner { margin-top: 110px; max-height: 500px; }
        }

        .header-banner::after { content: ''; position: absolute; bottom: 0; width: 100%; height: 50%; background: linear-gradient(transparent, var(--bg)); }
        .content-section { display: none; padding: 20px 5%; animation: fadeIn 0.4s ease; }
        .content-section.active { display: block; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); border: 1px solid #222; border-radius: 12px; overflow: hidden; }
        .media-container { width: 100%; aspect-ratio: 16/9; background: #000; }
        .media-container video, .media-container img { width: 100%; height: 100%; object-fit: contain; }
        .card-info { padding: 10px; text-align: center; font-size: 0.8rem; color: #666; border-top: 1px solid #222; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <nav>
        <div class="logo-area"><img src="LiziQ Logo.jpg" alt="Logo"></div>
        <div class="menu">
            <button class="menu-btn active" onclick="showPage('home')">首頁</button>
            <button class="menu-btn" onclick="showPage('laoli')">老李</button>
            <button class="menu-btn" onclick="showPage('xiaoli')">小李</button>
            <button class="menu-btn" onclick="showPage('xiaoli_f')">小荔</button>
            <button class="menu-btn" onclick="showPage('pili')">小霹靂</button>
            <button class="menu-btn" onclick="showPage('mowei')">魔尾</button>
            <button class="menu-btn" onclick="showPage('vlab')">小荔廚房</button>
        </div>
    </nav>

    <div class="header-banner"></div>

    <section id="home" class="content-section active">
        <h2 style="text-align:center; font-weight:200; letter-spacing:5px;">CHANNEL SELECTION</h2>
        <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(280px, 1fr)); gap:20px; margin-top:30px;">
            <a href="http://www.youtube.com/@LiziQ3308" target="_blank" style="background:#111; padding:20px; border-radius:10px; border-left:4px solid #f00; text-decoration:none; color:white;"><h3>Lizi Q Main</h3><p>Professional Shorts & Animation</p></a>
            <a href="http://www.youtube.com/@LiziQanimals" target="_blank" style="background:#111; padding:20px; border-radius:10px; border-left:4px solid #f00; text-decoration:none; color:white;"><h3>Lizi Q Animals</h3><p>AI Fantasy Animal Lab</p></a>
        </div>
    </section>

    <section id="laoli" class="content-section"><div class="grid">
        <div class="card"><div class="media-container"><img src="Lizi Q_0_0.gif"></div></div>
        <div class="card"><div class="media-container"><video autoplay loop muted playsinline><source src="Lizi Q_0_1.mp4" type="video/mp4"></video></div></div>
    </div></section>

    <section id="xiaoli" class="content-section"><div class="grid">
        <div class="card"><div class="media-container"><video autoplay loop muted playsinline><source src="Lizi Q_1_1.mp4" type="video/mp4"></video></div></div>
        <div class="card"><div class="media-container"><video autoplay loop muted playsinline><source src="Lizi Q_1_2.mp4" type="video/mp4"></video></div></div>
        <div class="card"><div class="media-container"><video autoplay loop muted playsinline><source src="Lizi Q_1_3.mp4" type="video/mp4"></video></div></div>
    </div></section>

    <section id="xiaoli_f" class="content-section"><div class="grid">
        <div class="card"><div class="media-container"><video autoplay loop muted playsinline><source src="Lizi Q_2_1.mp4" type="video/mp4"></video></div></div>
        <div class="card"><div class="media-container"><video autoplay loop muted playsinline><source src="Lizi Q_2_2.mp4" type="video/mp4"></video></div></div>
    </div></section>

    <section id="pili" class="content-section"><div class="grid">
        <div class="card"><div class="media-container"><video autoplay loop muted playsinline><source src="Lizi Q_3_1.mp4" type="video/mp4"></video></div></div>
        <div class="card"><div class="media-container"><video autoplay loop muted playsinline><source src="Lizi Q_3_2.mp4" type="video/mp4"></video></div></div>
        <div class="card"><div class="media-container"><video autoplay loop muted playsinline><source src="Lizi Q_3_3.mp4" type="video/mp4"></video></div></div>
    </div></section>

    <section id="mowei" class="content-section"><div class="grid">
        <div class="card"><div class="media-container"><video autoplay loop muted playsinline><source src="Lizi Q_4_1.mp4" type="video/mp4"></video></div></div>
        <div class="card"><div class="media-container"><video autoplay loop muted playsinline><source src="Lizi Q_4_2.mp4" type="video/mp4"></video></div></div>
    </div></section>

    <section id="vlab" class="content-section"><div class="grid">
        <div class="card"><div class="media-container"><video autoplay loop muted playsinline><source src="Lizi Q_5_1.mp4" type="video/mp4"></video></div></div>
        <div class="card"><div class="media-container"><video autoplay loop muted playsinline><source src="Lizi Q_5_2.mp4" type="video/mp4"></video></div></div>
    </div></section>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            event.currentTarget.classList.add('active');
            window.scrollTo({ top: 120, behavior: 'smooth' });
        }
    </script>
</body>
</html>
